spring:
  application:
    name: lv2-final-mission
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show-sql: true
        dialect: org.hibernate.dialect.H2Dialect
#    open-in-view: false
  sql:
    init:
      data-locations=:
  config:
    activate:
      on-profile: test
logging:
  level:
    org.hibernate.orm.jdbc.bind: trace
